<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RSVP</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 50px; }
    form { max-width: 400px; margin: auto; }
    input, textarea { width: 100%; padding: 10px; margin: 5px 0; }
    button { padding: 10px 20px; }
  </style>
</head>
<body>
  <h1>Rückmeldung für unsere Hochzeit</h1>
  <form id="rsvp-form">
    <label>Name:</label>
    <input type="text" name="name" required>
    
    <label>Wirst du kommen?</label>
    <select name="attending" required>
      <option value="">Select</option>
      <option value="yes">Ja</option>
      <option value="no">Nein</option>
    </select>
    
    <label>zusätzliche Informationen:</label>
    <textarea name="message"></textarea>
    
    <button type="submit">Submit</button>
  </form>

  <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdBKEVLDNHEqysGi_9qdii0uEhP_MovNrV2mmYvKcnUbOCyMA/viewform?embedded=true" width="640" height="764" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>

  <p id="response"></p>

  <script>
    const form = document.getElementById('rsvp-form');
    const response = document.getElementById('response');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      response.textContent = "Danke für deine Rückmeldung!";
      form.reset();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Silas und Katja</title>
  <style>
  
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
  
    background-image:url("test2.jpg");
    background-size:cover;
    background-position:center;
  }
  
  /* card */
  .card{
    background:rgba(255,255,255,0.92);
    padding:40px;
    border-radius:12px;
    width:420px;
    max-width:90%;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
    text-align:center;
  }
  
  /* inputs */
  input, select, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:16px;
  }
  
  /* button */
  button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:6px;
    background:#333;
    color:white;
    font-size:18px;
    cursor:pointer;
  }
  
  button:hover{
    background:#555;
  }
  
  /* success message */
  #success{
    display:none;
    color:green;
    margin-top:15px;
    font-size:18px;
  }
  
  /* mobile */
  @media (max-width:600px){
    .card{
      padding:25px;
      width:95%;
    }
  
    input, select, textarea{
      font-size:18px;
      padding:14px;
    }
  
    button{
      font-size:20px;
    }
  }
  
  </style>
  </head>
  <body>
    <div class="card">

      <h2>Rückmeldung für unsere Hochzeit</h2>
      
      <form action="https://script.google.com/macros/s/AKfycbx_K__Vn8_jt2wI6MYUkhimGuQfRIMruiBy7M8pH6ZUm-ttdmvU0wTsKKp0BUUzgWXjGw/exec" method="POST" id="rsvpForm"
        target="hidden_iframe" onsubmit="showMessage()">
      
      <input name="Name" placeholder="Name" required>
    
      <select name="Komme" required>
        <option value="">Wirst du kommen?</option>
        <option value="Yes">Ja</option>
        <option value="No">Nein</option>
      </select>
      
      <input name="Anzahl" placeholder="Anzahl der Gäste">
      
      <textarea name="Bemerkung" placeholder="weitere Informationen (optional)"></textarea>
      
      <button type="submit">Rückmeldung senden</button>
      
      </form>
      <p id="success">Danke, wir haben eure Rückmeldung erhalten</p>
    </div>

    <iframe name="hidden_iframe" style="display:none;"></iframe>
    
    <script>
    function showMessage(){
      setTimeout(() => {
        document.getElementById("success").style.display = "block";
      }, 500);
    }
    </script>
    
  </body>
</html>

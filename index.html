<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Silas und Katja</title>
  <style>
  </style>
</head>
<body>
  <form id="rsvpForm">
  
  <input name="Name" placeholder="Name" required>

  <select name="Komme" required>
    <option value="">Will you attend?</option>
    <option value="Yes">Yes</option>
    <option value="No">No</option>
  </select>
  
  <input name="Anzahl" placeholder="Number of guests">
  
  <textarea name="Bemerkung" placeholder="Message"></textarea>
  
  <button type="submit">Send RSVP</button>
  
  </form>
</body>
</html>
<script>
  https:
  const scriptURL = "https://script.google.com/macros/s/AKfycbzjsfn1DDdrEFF9skoA6k9Ik6y_xAj9cgVZApGkdNUnoLNQcAR0LSgkvycgys3Tedt0oA/exec";
  const form = document.getElementById("rsvpForm");
  const status = document.getElementById("status");
  
  form.addEventListener("submit", e => {
    e.preventDefault();
  
    const data = Object.fromEntries(new FormData(form));
  
    fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify(data)
    })
    .then(() => {
      status.innerText = "Thank you! RSVP received.";
      form.reset();
    })
    .catch(() => {
      status.innerText = "Error. Please try again.";
    });
  });
</script>

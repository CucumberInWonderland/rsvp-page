<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Silas & Katja</title>

<!-- Wedding font -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  font-family:'Inter', sans-serif;

  background-image:url("test2.jpg");
  background-size:cover;
  background-position:center;
}

/* glass card */
.card{
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);

  background:rgba(255,255,255,0.25);
  border:1px solid rgba(255,255,255,0.3);

  padding:45px;
  border-radius:18px;
  width:420px;
  max-width:90%;

  box-shadow:0 20px 60px rgba(0,0,0,0.25);
  text-align:center;
  color:#222;
}

/* wedding title */
h1{
  font-family:'Playfair Display', serif;
  font-size:32px;
  margin-bottom:25px;
}

/* inputs */
input, select, textarea{
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.6);
  background:rgba(255,255,255,0.6);
  font-size:16px;
  backdrop-filter: blur(5px);
}

/* button */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:8px;
  background:#2c2c2c;
  color:white;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#444;
}

/* disabled look */
button:disabled{
  background:#888;
  cursor:not-allowed;
}

/* success message */
#success{
  display:none;
  margin-top:20px;
  font-size:18px;
  color:#1b5e20;
  font-weight:500;
}

/* mobile */
@media (max-width:600px){
  .card{
    padding:25px;
  }

  h1{
    font-size:26px;
  }

  input, select, textarea{
    font-size:18px;
  }

  button{
    font-size:20px;
  }
}

</style>
</head>

<body>

<div class="card">

<h1>Silas & Katja</h1>

<form 
id="rsvpForm"
action="https://script.google.com/macros/s/AKfycbx_K__Vn8_jt2wI6MYUkhimGuQfRIMruiBy7M8pH6ZUm-ttdmvU0wTsKKp0BUUzgWXjGw/exec"
method="POST"
target="hidden_iframe"
onsubmit="handleSubmit(); return true;"
>

<input name="Name" placeholder="Namen" required>

<select name="Komme" required>
  <option value="">Wirst du kommen?</option>
  <option value="Yes">Ja</option>
  <option value="No">Nein</option>
</select>

<input name="Anzahl" placeholder="Anzahl der Gäste" required>

<textarea name="Bemerkung" placeholder="weitere Informationen (optional)"></textarea>

<button type="submit" id="submitBtn">Rückmeldung senden</button>

</form>

<p id="success">Danke, wir haben deine Rückmeldung erhalten 🤍</p>

</div>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>

// delay disabling slightly so data can send
  setTimeout(() => {
    const form = document.getElementById("rsvpForm");
    const elements = form.elements;

    for (let i = 0; i < elements.length; i++) {
      elements[i].disabled = true;
    }
  }, 100);

  // show message
  setTimeout(() => {
    document.getElementById("success").style.display = "block";
  }, 500);
</script>

</body>
</html>

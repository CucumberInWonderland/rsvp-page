<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Silas & Katja</title>

<!-- Wedding font -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  font-family:'Inter', sans-serif;

  background-image:url("test2.jpg");
  background-size:cover;
  background-position:center;
}

/* glass card */
.card{
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);

  background:rgba(255,255,255,0.25);
  border:1px solid rgba(255,255,255,0.3);

  padding:45px;
  border-radius:18px;
  width:420px;
  max-width:90%;

  box-shadow:0 20px 60px rgba(0,0,0,0.25);
  text-align:center;
  color:#222;
}

  form{
  display:flex;
  flex-direction:column;
  gap:14px; 
}

h1{
  font-family:'Playfair Display', serif;
  font-size:32px;
  margin-bottom:25px;
}

input, select, textarea, button{
  width:100%;
  padding:14px;
  border-radius:10px;
  font-size:16px;
  box-sizing:border-box;
  transition: all 0.25s ease; 
}

/* unify borders/background */
input, select, textarea{
  border:1px solid rgba(255,255,255,0.6);
  background:rgba(255,255,255,0.6);
  backdrop-filter: blur(6px);
}

input:focus, select:focus, textarea:focus{
  outline:none;
  border-color:#ffffff;
  box-shadow:0 0 0 3px rgba(255,255,255,0.4);
  background:rgba(255,255,255,0.75);
}

select, button{
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;
}

select{
  background-image: url("data:image/svg+xml;utf8,<svg fill='black' height='20' viewBox='0 0 20 20' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M5 7l5 5 5-5z'/></svg>");
  background-repeat:no-repeat;
  background-position:right 10px center;
  background-size:16px;
}
  
button{
  border:none;
  background:#2c2c2c;
  color:white;
  cursor:pointer;
  font-size:18px;
  letter-spacing:0.5px;
}

.card{
  animation:fadeInUp 0.8s ease;
}
  
@keyframes fadeInUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}
  
button:hover{
  background:#444;
  transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(0,0,0,0.25);
}

button:active{
  transform:translateY(1px);
  box-shadow:0 3px 10px rgba(0,0,0,0.2);
}
  
/* disabled look */
button:disabled,
input:disabled,
select:disabled,
textarea:disabled{
  opacity:0.6;
  cursor:not-allowed;
}


::placeholder{
  color:#555;
  opacity:0.8;
}
  
/* success message */
#success{
  display:none;
  margin-top:20px;
  font-size:18px;
  color:#1b5e20;
  font-weight:500;
}

/* mobile */
@media (max-width:600px){
  .card{
    padding:25px;
  }

  h1{
    font-size:26px;
  }

  input, select, textarea{
    font-size:18px;
  }

  button{
    font-size:20px;
  }
}

</style>
</head>

<body>

<div class="card">

<h1>Silas & Katja</h1>

<form 
id="rsvpForm"
action="https://script.google.com/macros/s/AKfycbx_K__Vn8_jt2wI6MYUkhimGuQfRIMruiBy7M8pH6ZUm-ttdmvU0wTsKKp0BUUzgWXjGw/exec"
method="POST"
target="hidden_iframe"
>

<input name="Name" placeholder="Namen" required>

<select name="Komme" required>
  <option value="">Wirst du kommen?</option>
  <option value="Yes">Ja</option>
  <option value="No">Nein</option>
</select>

<input name="Anzahl" placeholder="Anzahl der Gäste" required>

<textarea name="Bemerkung" placeholder="weitere Informationen (optional)"></textarea>

<button type="submit" id="submitBtn">Rückmeldung senden</button>

</form>

<p id="success">Danke, wir haben deine Rückmeldung erhalten 🤍</p>

</div>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>
 const form = document.getElementById("rsvpForm");
    const success = document.getElementById("success");

    form.addEventListener("submit", function () {
      setTimeout(() => {
        Array.from(form.elements).forEach(el => {
          el.disabled = true;
        });
        success.style.display = "block";
      }, 100);
    });
</script>

</body>
</html>
